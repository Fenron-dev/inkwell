name: inkwell
description: "Inkwell — Dein privates Journal. Lokal, verschlüsselt, Obsidian-kompatibel."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database (Search Index)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # Markdown
  flutter_markdown: ^0.7.6
  markdown: ^7.2.2

  # File System
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^10.1.7
  watcher: ^1.1.1

  # UI
  intl: ^0.20.2
  gap: ^3.0.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # YAML (Frontmatter parsing)
  yaml: ^3.1.3
  yaml_writer: ^2.0.0

  # UUID
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  custom_lint: ^0.7.2
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true
