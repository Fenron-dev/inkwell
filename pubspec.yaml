name: inkwell
description: "Inkwell — Dein privates Journal. Lokal, verschlüsselt, Obsidian-kompatibel."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database (Search Index)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # Markdown
  flutter_markdown: ^0.7.6
  markdown: ^7.2.2

  # File System
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^10.1.7
  watcher: ^1.1.1

  # UI
  intl: ^0.20.2
  gap: ^3.0.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # YAML (Frontmatter parsing)
  yaml: ^3.1.3
  yaml_writer: ^2.0.0

  # UUID
  uuid: ^4.5.1

  # ZIP Export
  archive: ^3.6.1

  # Link opening
  url_launcher: ^6.3.1

  # App Lock
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6

  # Speech-to-Text (dictation in editor)
  speech_to_text: ^7.0.0

dependency_overrides:
  # speech_to_text_windows 0.3.x fails to compile on Windows CI due to a
  # WinRT/coroutine naming mismatch. This local no-op stub provides the
  # required C symbol so the build succeeds; STT simply reports "unavailable"
  # on Windows at runtime (mic button is hidden).
  speech_to_text_windows:
    path: stubs/speech_to_text_windows

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  custom_lint: ^0.7.2
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true
